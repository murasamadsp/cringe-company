name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate index file exists
        run: |
          if [ ! -f styles.css ]; then
            echo "styles.css is missing"
            exit 1
          fi
          if [ ! -f main.js ]; then
            echo "main.js is missing"
            exit 1
          fi
          if [ ! -f index.html ]; then
            echo "index.html is missing"
            exit 1
          fi

      - name: Basic HTML sanity checks
        run: |
          if ! grep -qi "<!DOCTYPE html>" index.html; then
            echo "Missing DOCTYPE declaration"
            exit 1
          fi

          if ! grep -q "<body" index.html; then
            echo "Missing <body> tag"
            exit 1
          fi

          if ! grep -q "</html>" index.html; then
            echo "Missing closing </html> tag"
            exit 1
          fi
          if ! grep -Eq 'href="(\./)?styles\.css"' index.html; then
            echo "Main stylesheet link is missing or changed"
            exit 1
          fi
          if ! grep -Eq 'src="(\./)?main\.js"' index.html; then
            echo "Main script link is missing or changed"
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path
          import re
          from datetime import datetime
          text = Path("index.html").read_text(encoding="utf-8")
          required = ["id=\"particleCanvas\"", "class=\"nav\"", "id=\"notifyForm\""]
          for marker in required:
              if marker not in text:
                  raise SystemExit(f"Missing required marker: {marker}")

          # Enforce configurable launch date for countdown section.
          launch_match = re.search(r'id=\"launchPanel\".*data-launch-date=\"([^\"]+)\"', text, re.S)
          if not launch_match:
              raise SystemExit("Missing launch panel launch date marker: id=\"launchPanel\" and data-launch-date")

          launch_date_value = launch_match.group(1).strip()
          normalized_launch_date = launch_date_value.replace("Z", "+00:00")
          datetime.fromisoformat(normalized_launch_date)
          print("index.html checks passed")
          PY
