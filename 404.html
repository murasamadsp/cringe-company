<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — cringe.company</title>
  <style>
    :root {
      --bg: #060c1a;
      --text: #eef4ff;
      --accent: #6de0ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(900px 500px at 12% 22%, #193059, transparent 55%),
        radial-gradient(900px 500px at 88% 80%, #4f3760, transparent 50%),
        linear-gradient(120deg, #03070f, #081129);
    }

    .box {
      max-width: 560px;
      text-align: center;
      padding: 28px;
      border: 1px solid rgba(109, 224, 255, 0.25);
      border-radius: 18px;
      background: rgba(9, 17, 39, 0.58);
      box-shadow: 0 24px 40px rgba(5, 10, 30, 0.45);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    a {
      margin-top: 16px;
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(109, 224, 255, 0.45);
      padding: 10px 16px;
      border-radius: 10px;
      background: rgba(10, 19, 44, 0.65);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Страница не найдена. Вернуться обратно:</p>
    <a href="./">На главную</a>
  </div>
</body>
</html>
